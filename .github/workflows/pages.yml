name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate static site
        run: |
          test -f site/index.html
          test -f site/css/styles.css
          test -f site/js/app.js
          test -f site/js/auth.js
          test -f site/js/authSession.js
          test -f site/js/config.js
          test -f site/.nojekyll

      - name: Inject Supabase public config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          [[ -n "${SUPABASE_URL}" ]] || { echo "Missing environment secret SUPABASE_URL"; exit 1; }
          [[ -n "${SUPABASE_ANON_KEY}" ]] || { echo "Missing environment secret SUPABASE_ANON_KEY"; exit 1; }
          cat > site/js/config.js <<EOF
          export const CONFIG = {
            supabaseUrl: "${SUPABASE_URL}",
            supabaseAnonKey: "${SUPABASE_ANON_KEY}",
            pollingIntervalMs: 3000,
            hiddenPollingIntervalMs: 15000,
            requestTimeoutMs: 15000,
          };

          export function isApiConfigured() {
            return Boolean(
              CONFIG.supabaseUrl
                && !CONFIG.supabaseUrl.includes("PASTE_HERE")
                && /^https:\/\//i.test(CONFIG.supabaseUrl)
                && CONFIG.supabaseAnonKey
                && !CONFIG.supabaseAnonKey.includes("PASTE_HERE"),
            );
          }

          export function isGoogleAuthConfigured() {
            return isApiConfigured();
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
